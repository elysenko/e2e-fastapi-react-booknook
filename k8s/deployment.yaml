apiVersion: apps/v1
kind: Deployment
metadata:
  name: e2e-fastapi-react-booknook-staging
  namespace: colossus-e2e-fastapi-react-booknook-staging
  labels:
    app: e2e-fastapi-react-booknook-staging
    managed-by: colossus
spec:
  replicas: 1
  # Recreate: per-project namespace has a hard memory ResourceQuota that a RollingUpdate
  # would exceed transiently.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: e2e-fastapi-react-booknook-staging
  template:
    metadata:
      labels:
        app: e2e-fastapi-react-booknook-staging
    spec:
      hostAliases:
        - ip: "192.168.50.250"
          hostnames:
            - "ubuntu.desmana-truck.ts.net"
      containers:
        - name: app
          image: ubuntu:30500/e2e-fastapi-react-booknook-staging:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: app-secrets
                optional: true
