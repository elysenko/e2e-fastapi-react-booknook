server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # /api/ and /trpc/ MUST be proxied to the backend — otherwise nginx 405s every API call.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /trpc/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — return 404 (not the SPA index) so missing bundles surface as errors.
    location ~* \.(js|css|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|map|webp)$ {
        try_files $uri =404;
    }

    # SPA fallback: any other path serves index.html (react-router BrowserRouter deep links).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
